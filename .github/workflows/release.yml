name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Tag version:   $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

  build:
    name: Build - ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: phyllotaxis-x86_64-unknown-linux-gnu.tar.gz
            archive_cmd: tar
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: phyllotaxis-aarch64-unknown-linux-gnu.tar.gz
            archive_cmd: tar
          - target: x86_64-apple-darwin
            runner: macos-14
            archive: phyllotaxis-x86_64-apple-darwin.tar.gz
            archive_cmd: tar
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: phyllotaxis-aarch64-apple-darwin.tar.gz
            archive_cmd: tar
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: phyllotaxis-x86_64-pc-windows-msvc.zip
            archive_cmd: zip

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: matrix.archive_cmd == 'tar'
        run: |
          tar -czf ${{ matrix.archive }} \
            -C target/${{ matrix.target }}/release \
            phyllotaxis phyll

      - name: Package (Windows)
        if: matrix.archive_cmd == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path `
            "target/${{ matrix.target }}/release/phyllotaxis.exe", `
            "target/${{ matrix.target }}/release/phyll.exe" `
            -DestinationPath "${{ matrix.archive }}"

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.archive }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          sha256sum phyllotaxis-*.tar.gz phyllotaxis-*.zip > checksums.txt
          cat checksums.txt

      - name: Prepare release notes
        id: notes
        run: |
          NOTES_FILE="releases/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "notes_file=$NOTES_FILE" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release (with release notes)
        if: steps.notes.outputs.notes_file != ''
        env:
          GH_TOKEN: ${{ github.token }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file "$NOTES_FILE" \
            phyllotaxis-*.tar.gz phyllotaxis-*.zip \
            checksums.txt

      - name: Create GitHub Release (auto-generated notes)
        if: steps.notes.outputs.notes_file == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            phyllotaxis-*.tar.gz phyllotaxis-*.zip \
            checksums.txt

  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  update-homebrew:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$GITHUB_REF_NAME" \
            --repo OpenScribbler/phyllotaxis \
            --pattern checksums.txt

      - name: Checkout tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: OpenScribbler/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"

          SHA_AARCH64_DARWIN=$(grep aarch64-apple-darwin checksums.txt | cut -d' ' -f1)
          SHA_X86_64_DARWIN=$(grep x86_64-apple-darwin checksums.txt | cut -d' ' -f1)
          SHA_AARCH64_LINUX=$(grep aarch64-unknown-linux checksums.txt | cut -d' ' -f1)
          SHA_X86_64_LINUX=$(grep x86_64-unknown-linux checksums.txt | cut -d' ' -f1)

          cat > Formula/phyllotaxis.rb << FORMULA
          class Phyllotaxis < Formula
            desc "Progressive disclosure CLI for OpenAPI specs"
            homepage "https://github.com/OpenScribbler/phyllotaxis"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/OpenScribbler/phyllotaxis/releases/download/v#{version}/phyllotaxis-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_DARWIN}"
              end
              on_intel do
                url "https://github.com/OpenScribbler/phyllotaxis/releases/download/v#{version}/phyllotaxis-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_DARWIN}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/OpenScribbler/phyllotaxis/releases/download/v#{version}/phyllotaxis-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              end
              on_intel do
                url "https://github.com/OpenScribbler/phyllotaxis/releases/download/v#{version}/phyllotaxis-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "phyllotaxis"
              bin.install "phyll"
            end

            test do
              assert_match "phyllotaxis", shell_output("#{bin}/phyllotaxis --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/phyllotaxis.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/phyllotaxis.rb
          git commit -m "Update phyllotaxis to ${GITHUB_REF_NAME}"
          git push
